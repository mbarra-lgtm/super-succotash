name: Odoo → Supabase (cada 20 min, L-V 07-19 CL)

on:
  # Disparado por pg_cron en Supabase (job 'dispatch-mp-odoo') vía workflow_dispatch.
  # Sin 'schedule' nativo a propósito: el cron de GitHub es best-effort y duplicaría runs.
  workflow_dispatch:

concurrency:
  group: odoo-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: odoo_sync
    env:
      RUN_ONCE:                 "1"
      SKIP_FULL_RESYNC:         "1"   # los full-resync diarios corren en mp-odoo-full.yml
      TZ_LOCAL:                 "America/Santiago"
      WORK_START_HOUR:          "7"
      WORK_END_HOUR:            "19"
      SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
      # el script acepta cualquiera de los dos; reusa el SUPABASE_SERVICE_KEY que ya cargaste
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SERVICE_KEY:     ${{ secrets.SUPABASE_SERVICE_KEY }}
      ODOO_JSONRPC:             ${{ secrets.ODOO_JSONRPC }}
      ODOO_DB:                  ${{ secrets.ODOO_DB }}
      ODOO_USER:                ${{ secrets.ODOO_USER }}
      ODOO_API_KEY:             ${{ secrets.ODOO_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python sync_odoo_supabase.py
