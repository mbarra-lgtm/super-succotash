name: MP · Licitaciones + OC (cada 2h)

on:
  schedule:
    - cron: "15 */2 * * *"     # cada 2 horas, minuto 15 (UTC)
  workflow_dispatch:

concurrency:
  group: mp-licitaciones-oc
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    defaults:
      run:
        working-directory: mp_sync
    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TICKET_ACTIVAS:       ${{ secrets.TICKET_ACTIVAS }}
      TICKET_OC:            ${{ secrets.TICKET_OC }}
      CURSOR_BACKEND:       supabase
      SLEEP_BETWEEN:        "2.0"
      SLEEP_BETWEEN_OC:     "3.0"
      LIC_MAX_POR_RUN:      "200"
      OC_DIAS_ATRAS:        "1"
      OC_MAX_DETALLE:       "300"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Licitaciones activas
        run: python sync_activas.py
      - name: Órdenes de compra
        run: python sync_oc.py
